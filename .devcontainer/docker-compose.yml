version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile # We'll let devcontainer.json handle the base image
    volumes:
      - ..:/workspaces:cached
    network_mode: service:db # Shares localhost between app and db

  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      - POSTGRES_DB=voxels
      - POSTGRES_HOST_AUTH_METHOD=trust # For easy local dev access
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: